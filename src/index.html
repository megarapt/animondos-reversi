<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Animondos' Reversi</title>

    <!-- Favicons & PWA Icons -->
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    
    <!-- PWA & iOS Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Animondos' Reversi" />
    <link rel="manifest" href="site.webmanifest" />

    <!-- Webpack will inject CSS here automatically if configured correctly, 
         but keeping this reference is safe for dev -->
  </head>
  <body>
    <!-- DONATION RIBBON -->
    <div id="donation-corner" class="donation-ribbon" style="display: none">
      <a href="#" target="_blank" rel="noopener noreferrer" id="donation-link">
        <div class="ribbon-triangle">
          <span class="ribbon-text-short" data-i18n="donate_short">Donate</span>
        </div>
        <div class="ribbon-message">
          <span data-i18n="donate_full">Donate to help us keep making free games</span>
        </div>
      </a>
    </div>
    <!-- BOOT SCREEN -->
    <div id="screen-boot" class="game-screen">
      <button id="btn-boot" class="boot-btn loading">
        <span class="icon-spinner"></span>
      </button>
    </div>

    <!-- LOGO/PRELOADER SCREEN -->
    <div id="screen-logo" class="game-screen" style="display: none"></div>

    <!-- SPLASH SCREEN -->
    <div id="screen-splash" class="game-screen" style="display: none">
      <img src="img/reversi-logo.webp" id="splash-logo" alt="Reversi Logo" />
      <div class="splash-text" data-i18n="touch_to_start">Tap to Start</div>
      <div id="info-text" data-i18n="info_text">Raptware ® 2026 - version 0.0.0</div>
    </div>

    <!-- MAIN MENU -->
    <div id="screen-mainmenu" class="game-screen" style="display: none">
      <h2 class="menu-title" data-i18n="menu_title">Select Opponent</h2>
      <div class="scroll-indicator scroll-up">▲</div>
      <div class="character-list" id="opponent-list"></div>
      <div class="scroll-indicator scroll-down">▼</div>
    </div>

    <!-- CHARACTER PRELOADER -->
    <div id="screen-char-preloader" class="game-screen" style="display: none"></div>

    <!-- GAMEPLAY AREA -->
    <div id="screen-gameplay" class="game-screen" style="display: none">
      <canvas id="confetti-canvas"></canvas>
      
      <div id="score-counter">
        <div class="score-row">
          <span data-i18n="score_black">Black:</span>
          <span id="score-black">2</span>
        </div>
        <div class="score-row">
          <span data-i18n="score_white">White:</span>
          <span id="score-white">2</span>
        </div>
      </div>

      <div class="game-main-area">
        <div id="opponent-character">
          <img alt="Opponent" />
        </div>

        <div class="board-scene">
          <div id="status" class="game-status-bar">Waiting for Game...</div>
          <div id="board"></div>
        </div>
      </div>

      <!-- UI CONTROLS -->
      <div class="bottom-bar">
        <button id="btn-exit" class="chip-btn" data-i18n="btn_exit">Exit</button>
        <button id="btn-restart" class="chip-btn" data-i18n="btn_restart">Restart</button>
        <button id="btn-audio" class="chip-btn" data-i18n="btn_audio_off">Mute Audio</button>
        
        <div id="exit-message" style="display: none" data-i18n="exit_message">
          TAP TO EXIT
        </div>
      </div>
    </div>

    <!-- WEBPACK WILL AUTOMATICALLY INJECT <script> HERE -->
  </body>
</html>
